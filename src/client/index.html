<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Tacticians | Torneo de Generales</title>
    <meta name="description" content="Tiny Tacticians: Entrena generales legendarios con consejeros estratégicos y compite en el torneo PvP de Reddit." />
    <!-- Google Fonts: condensed display titles (Oswald) + readable retro mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=VT323&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #15110e;
      }
      /* Fondo temático para el letterbox: en escritorio el lienzo portrait
         se centra y los lados muestran este degradado oscuro de la paleta. */
      /* El CSS (flexbox) centra el lienzo y Phaser usa autoCenter NONE: así el
         mapeo de clics (getBoundingClientRect) coincide con lo que se ve.
         Centrar con CENTER_BOTH desfasaba los clics arriba-izquierda. */
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 40%, #1f1812 0%, #15110e 60%, #0d0a08 100%);
      }
      /* 'auto' (no 'pixelated'): el lienzo se escala suave por CSS para que
         las fuentes web no salgan en bloques. Los sprites mantienen su look
         pixel-art por el filtrado NEAREST de WebGL (pixelArt:true en Phaser). */
      #game canvas { image-rendering: auto; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
